<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      --bg: #1a1a1f;
      --surface: #242429;
      --surface-hover: #2c2c33;
      --border: #333340;
      --text: #e8e8ed;
      --text-dim: #8b8b9e;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --red: #ef4444;
      --green: #34d399;
      --mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --radius: 10px;
    }

    [data-theme="light"] {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-hover: #f0f0f2;
      --border: #d8d8de;
      --text: #1d1d1f;
      --text-dim: #6e6e80;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --red: #dc2626;
      --green: #16a34a;
    }

    [data-theme="light"] ::-webkit-scrollbar-thumb { background: #c0c0c8; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }

    /* Titlebar drag region */
    .titlebar {
      height: 28px;
      -webkit-app-region: drag;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    /* Layout */
    .header {
      padding: 18px 24px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .app-icon {
      width: 36px; height: 36px;
      flex-shrink: 0;
    }
    .app-icon svg { width: 36px; height: 36px; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
    .header .subtitle { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    /* Buttons */
    button {
      font-family: var(--sans);
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.15s ease;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-surface {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-surface:hover { background: var(--surface-hover); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
    .btn-icon {
      width: 34px; height: 34px; border-radius: 8px; padding: 0;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { background: var(--surface-hover); color: var(--text); }

    /* Search */
    .search-bar { padding: 14px 24px 0; }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
      display: flex; align-items: center;
    }
    .search-input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: var(--sans);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }

    /* Tabs */
    .tabs { padding: 12px 24px 0; display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      padding: 6px 13px; border-radius: 8px; font-size: 12px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface); color: var(--text-dim); border: 1px solid var(--border);
    }
    .tab:hover { background: var(--surface-hover); }
    .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    .tab-count {
      padding: 1px 6px; border-radius: 10px; font-size: 10.5px;
      background: var(--border); color: var(--text-dim);
    }
    .tab.active .tab-count { background: rgba(99, 102, 241, 0.2); color: var(--accent); }

    /* Port list */
    .port-list { padding: 16px 24px 90px; }
    .group { margin-bottom: 20px; }
    .group.first-paint { animation: fadeIn 0.3s ease both; }
    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; padding: 0 4px;
    }
    .group-header-left { display: flex; align-items: center; gap: 8px; }
    .group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }
    .group-count { font-size: 11px; color: var(--text-dim); }
    .group-table {
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border); background: var(--surface);
    }

    .port-row {
      display: grid;
      grid-template-columns: 30px 60px 1fr 56px 72px 36px;
      align-items: center; gap: 10px; padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .port-list.scanning .group { opacity: 0.55; pointer-events: none; }
    .port-row:last-child { border-bottom: none; }
    .port-row:hover { background: var(--surface-hover); }
    .port-num { font-family: var(--mono); font-size: 13px; font-weight: 600; }
    .proc-name { font-size: 13px; font-weight: 600; }
    .proc-cmd {
      font-size: 11px; color: var(--text-dim); font-family: var(--mono);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }
    .pid-label { font-size: 11.5px; color: var(--text-dim); font-family: var(--mono); }

    .kill-single {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(239, 68, 68, 0.12); color: var(--red);
      font-size: 13px; display: flex; align-items: center; justify-content: center;
      opacity: 0.35; transition: opacity 0.12s, background 0.12s, color 0.12s;
    }
    .port-row:hover .kill-single { opacity: 1; }
    .kill-single:hover { background: var(--red); color: #fff; opacity: 1; }
    .kill-single:focus-visible { opacity: 1; outline: 2px solid var(--accent); outline-offset: 1px; }

    /* Badge */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
    }

    /* Checkbox */
    .checkbox {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.12s; flex-shrink: 0;
      font-size: 11px; color: transparent;
    }
    .checkbox.checked { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface); border-radius: 16px; padding: 26px 30px;
      width: 420px; max-width: 90vw;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      border: 1px solid var(--border); animation: modalIn 0.2s ease;
    }
    .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .modal p { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 6px; }
    .modal-list {
      background: var(--bg); border-radius: var(--radius); padding: 10px 14px;
      max-height: 200px; overflow-y: auto; margin-bottom: 18px; border: 1px solid var(--border);
    }
    .modal-list-item {
      display: flex; justify-content: space-between; padding: 5px 0;
      font-size: 12.5px; border-bottom: 1px solid var(--border);
    }
    .modal-list-item:last-child { border-bottom: none; }
    .modal-list-item .ml-name {
      font-weight: 600; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      max-width: 55%;
    }
    .modal-list-item .ml-detail { color: var(--text-dim); font-family: var(--mono); flex-shrink: 0; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal .force-toggle {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; font-size: 12.5px; color: var(--text-dim);
    }
    .modal .force-toggle input { accent-color: var(--red); }

    /* Toast */
    .toast {
      position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      padding: 10px 16px 10px 20px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35); z-index: 1000;
      display: flex; align-items: flex-start; gap: 10px; animation: toastIn 0.25s ease;
      max-width: min(560px, 90vw);
      white-space: normal; word-break: break-word; line-height: 1.45;
    }
    .toast-message { flex: 1; min-width: 0; }
    .toast.error { border-color: rgba(239, 68, 68, 0.45); }
    .toast.error .toast-icon { color: var(--red); }
    .toast .toast-icon { color: var(--green); flex-shrink: 0; margin-top: 1px; }
    .toast-close {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1;
      flex-shrink: 0; margin-top: 1px;
    }
    .toast-close:hover { color: var(--text); }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
    .empty p { font-size: 14px; }

    /* Skeleton */
    .skeleton-row {
      height: 48px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 800px; animation: shimmer 1.5s infinite linear;
      border-bottom: 1px solid var(--border);
    }
    .skeleton-row:last-child { border-bottom: none; }

    /* Footer */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 24px;
      background: linear-gradient(transparent, var(--bg) 40%);
      display: flex; justify-content: center; pointer-events: none;
    }
    .footer-hint {
      font-size: 11.5px; color: var(--text-dim);
      background: var(--surface); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 8px; font-family: var(--mono);
      pointer-events: auto;
    }

    /* Error display */
    .error-box {
      margin: 20px; padding: 20px; border-radius: 10px;
      background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red); font-family: var(--mono); font-size: 13px;
      white-space: pre-wrap; word-break: break-all;
    }

    /* Theme toggle icon */
    .theme-icon { width: 16px; height: 16px; display: block; }

    /* Bulk action bar */
    .bulk-bar {
      position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 8px 6px 16px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      z-index: 500; animation: toastIn 0.2s ease;
    }
    .bulk-bar-label { font-size: 12.5px; font-weight: 600; color: var(--text); }

    /* Category icons */
    .cat-icon { display: inline-block; vertical-align: -2px; }

    /* Copy-to-clipboard affordance */
    .copyable {
      background: none; border: none; padding: 0; margin: 0;
      font: inherit; color: inherit; cursor: copy;
      border-radius: 3px;
    }
    .copyable:hover { background: var(--surface-hover); box-shadow: 0 0 0 3px var(--surface-hover); }
    .copyable:focus { outline: 1px dashed var(--accent); outline-offset: 2px; }
    .proc-cmd.copyable { max-width: 100%; display: inline-block; }
    .proc-cmd.copyable:hover { text-decoration: underline; text-decoration-style: dotted; }

    /* User label next to process name */
    .proc-user {
      font-size: 11px; color: var(--text-dim); font-weight: 400;
      margin-left: 6px;
    }
    .sys-shield {
      display: inline-block; vertical-align: -2px; margin-left: 4px;
      color: #f59e42;
    }

    /* Sort select */
    .sort-select {
      font-family: var(--sans); font-size: 12px; font-weight: 600;
      background: var(--surface); color: var(--text-dim);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; cursor: pointer; outline: none;
      transition: all 0.15s;
    }
    .sort-select:hover { background: var(--surface-hover); color: var(--text); }
    .sort-select:focus { border-color: var(--accent); }

    /* Active-filter summary strip */
    .filter-summary {
      margin: 10px 24px 0; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; font-size: 12px; color: var(--text-dim);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .filter-summary strong { color: var(--text); font-weight: 600; }
    .filter-chip {
      background: var(--bg); padding: 2px 8px; border-radius: 6px;
      border: 1px solid var(--border);
    }
    .filter-summary .clear-all {
      margin-left: auto; background: none; border: none;
      color: var(--accent); font-size: 12px; font-weight: 600;
      cursor: pointer; padding: 2px 4px;
    }
    .filter-summary .clear-all:hover { text-decoration: underline; }

    /* Search clear button */
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--border); color: var(--text); border: none;
      font-size: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .search-clear:hover { background: var(--text-dim); color: var(--bg); }

    /* FREE port checker */
    .free-checker {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px 0;
    }
    .free-input-wrap {
      position: relative; flex: 0 0 auto;
    }
    .free-input {
      width: 110px; padding: 5px 10px; font-size: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); outline: none;
      transition: border-color 0.15s;
    }
    .free-input:focus { border-color: var(--accent); }
    .free-input.is-free { border-color: #34d399; }
    .free-input.is-used { border-color: var(--red); }
    .free-btn {
      padding: 5px 12px; font-size: 12px; border-radius: 6px; border: none;
      background: var(--surface); color: var(--text-dim);
      border: 1px solid var(--border); cursor: pointer; font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .free-btn:hover { background: var(--surface-hover); color: var(--text); }
    .free-result {
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .free-result.is-free { color: #34d399; }
    .free-result.is-used { color: var(--red); }
    .free-result.is-invalid { color: var(--text-dim); font-weight: 400; }

    /* Modal helper copy */
    .modal .signal-explain {
      font-size: 11.5px; color: var(--text-dim);
      margin-top: -2px; margin-bottom: 12px; line-height: 1.5;
    }

    /* Status footer bits */
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }
    .pulse-dot.stale {
      background: #f59e42;
      animation: none;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .footer-hint { display: inline-flex; align-items: center; gap: 8px; }
    .spinner-sm {
      display: inline-block; width: 10px; height: 10px;
      border: 1.5px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ─── Global error handler (must be first) ──────────────────────────────────
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('app');
  if (el) el.innerHTML = '<div class="error-box">Error: ' + msg + '\nLine ' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '</div>';
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('app');
  if (el) el.innerHTML = '<div class="error-box">Unhandled Promise: ' + (e.reason || e) + '</div>';
});

// ─── Tauri IPC bridge ──────────────────────────────────────────────────────
// Diagnostic proved: window.__TAURI__.tauri.invoke is the correct path in Tauri v1
var tauriInvoke = null;
try {
  if (window.__TAURI__ && window.__TAURI__.tauri && typeof window.__TAURI__.tauri.invoke === 'function') {
    tauriInvoke = window.__TAURI__.tauri.invoke;
  }
} catch(e) {}
var IS_TAURI = !!tauriInvoke;

// ─── Theme persistence ─────────────────────────────────────────────────────
var currentTheme = 'dark';
try { currentTheme = localStorage.getItem('pm-theme') || 'dark'; } catch(e) {}
document.documentElement.setAttribute('data-theme', currentTheme);

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  try { localStorage.setItem('pm-theme', currentTheme); } catch(e) {}
  render();
}

function invokeCommand(cmd, args) {
  if (!args) args = {};
  if (IS_TAURI) {
    return tauriInvoke(cmd, args);
  }
  // Mock fallback for browser preview
  if (cmd === 'scan_ports') {
    return new Promise(function(resolve) {
      setTimeout(function() {
        resolve({
          ports: [
            { pid: 1201, process: "node", port: 3000, protocol: "TCP", state: "LISTEN", user: "you", command: "node /usr/local/bin/next dev", category: "Dev Servers" },
            { pid: 1202, process: "node", port: 3001, protocol: "TCP", state: "LISTEN", user: "you", command: "node /usr/local/bin/next dev", category: "Dev Servers" },
            { pid: 1340, process: "Python", port: 8000, protocol: "TCP", state: "LISTEN", user: "you", command: "python3 -m http.server", category: "Dev Servers" },
            { pid: 502, process: "postgres", port: 5432, protocol: "TCP", state: "LISTEN", user: "_postgres", command: "/usr/local/opt/postgresql/bin/postgres", category: "Databases" },
            { pid: 503, process: "redis-server", port: 6379, protocol: "TCP", state: "LISTEN", user: "you", command: "redis-server *:6379", category: "Databases" },
            { pid: 700, process: "nginx", port: 80, protocol: "TCP", state: "LISTEN", user: "root", command: "nginx: master process", category: "Web / Proxy" },
            { pid: 900, process: "Docker", port: 2375, protocol: "TCP", state: "LISTEN", user: "root", command: "dockerd -H tcp://0.0.0.0:2375", category: "Containers" },
            { pid: 1000, process: "Spotify", port: 57621, protocol: "TCP", state: "LISTEN", user: "you", command: "/Applications/Spotify.app", category: "Apps" },
            { pid: 1500, process: "sshd", port: 22, protocol: "TCP", state: "LISTEN", user: "root", command: "sshd: /usr/sbin/sshd", category: "System" }
          ],
          error: null
        });
      }, 500);
    });
  }
  if (cmd === 'kill_ports') {
    return new Promise(function(resolve) {
      setTimeout(function() { resolve({ success: true, killed: args.pids || [], failed: [] }); }, 300);
    });
  }
  return Promise.resolve(null);
}

// ─── Category config ───────────────────────────────────────────────────────
var CATEGORIES = {
  "Dev Servers": { color: "#34d399" },
  "Databases":   { color: "#f59e42" },
  "Web / Proxy": { color: "#60a5fa" },
  "Containers":  { color: "#a78bfa" },
  "Apps":        { color: "#f472b6" },
  "System":      { color: "#94a3b8" },
  "Other":       { color: "#64748b" }
};

// SVG icons per category. Rendered at 12x12 with stroke=currentColor so they
// inherit the category accent colour from the surrounding text element.
var CATEGORY_ICON_PATHS = {
  "Dev Servers": '<polyline points="8 6 2 12 8 18"/><polyline points="16 6 22 12 16 18"/><line x1="14" y1="4" x2="10" y2="20"/>',
  "Databases":   '<ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/>',
  "Web / Proxy": '<circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3a13.5 13.5 0 0 1 0 18M12 3a13.5 13.5 0 0 0 0 18"/>',
  "Containers":  '<rect x="2" y="13" width="8" height="8" rx="1"/><rect x="14" y="13" width="8" height="8" rx="1"/><rect x="8" y="3" width="8" height="8" rx="1"/>',

  "Other":       '<circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r="0.5" fill="currentColor"/>'
};

function categoryIconSvg(name, size) {
  var s = size || 12;
  var paths = CATEGORY_ICON_PATHS[name] || CATEGORY_ICON_PATHS["Other"];
  return '<svg class="cat-icon" width="' + s + '" height="' + s + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + paths + '</svg>';
}

// ─── App State ─────────────────────────────────────────────────────────────
var state = {
  ports: [],
  selected: {},
  search: '',
  filterCat: 'All',
  scanning: false,
  modal: null,
  toast: null,
  toastTimer: null,
  sortKey: null,
  sortDir: 'asc',
  lastScanAt: null,
  hasRendered: false,
  freePort: '',
  freeResult: null  // null=unchecked, 'free', 'used', 'invalid', 'checking'
};

function sortItems(items) {
  if (!state.sortKey) return items;
  var key = state.sortKey, dir = state.sortDir;
  var mult = dir === 'asc' ? 1 : -1;
  return items.slice().sort(function(a, b) {
    var av = a[key], bv = b[key];
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    if (av < bv) return -1 * mult;
    if (av > bv) return 1 * mult;
    return 0;
  });
}

function onSort(key) {
  if (state.sortKey === key) {
    if (state.sortDir === 'asc') state.sortDir = 'desc';
    else { state.sortKey = null; state.sortDir = 'asc'; }
  } else {
    state.sortKey = key; state.sortDir = 'asc';
  }
  render();
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showToast(message, type) {
  if (!type) type = 'success';
  if (state.toastTimer) { clearTimeout(state.toastTimer); state.toastTimer = null; }
  state.toast = { message: message, type: type };
  render();
  // Errors are sticky — user must dismiss them. Success toasts self-expire.
  if (type !== 'error') {
    state.toastTimer = setTimeout(function() { state.toast = null; render(); }, 2800);
  }
}

function dismissToast() {
  if (state.toastTimer) { clearTimeout(state.toastTimer); state.toastTimer = null; }
  state.toast = null; render();
}

function getFiltered() {
  return state.ports.filter(function(p) {
    if (state.filterCat !== 'All' && p.category !== state.filterCat) return false;
    if (state.search) {
      var s = state.search.toLowerCase();
      return p.process.toLowerCase().indexOf(s) !== -1
        || String(p.port).indexOf(s) !== -1
        || p.command.toLowerCase().indexOf(s) !== -1;
    }
    return true;
  });
}

function getGrouped(filtered) {
  var g = {};
  for (var i = 0; i < filtered.length; i++) {
    var p = filtered[i];
    if (!g[p.category]) g[p.category] = [];
    g[p.category].push(p);
  }
  return g;
}

function getCatCounts() {
  var c = {};
  for (var i = 0; i < state.ports.length; i++) {
    var cat = state.ports[i].category;
    c[cat] = (c[cat] || 0) + 1;
  }
  return c;
}

function selectedCount() {
  var n = 0;
  for (var k in state.selected) { if (state.selected[k]) n++; }
  return n;
}

function getSelectedPorts() {
  return state.ports.filter(function(p) { return state.selected[p.pid]; });
}

function rgbaFrom(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

// ─── Actions ───────────────────────────────────────────────────────────────
var autoScanInterval = null;
var AUTO_SCAN_MS = 3000; // poll every 3 seconds

function doScan() {
  state.scanning = true;
  render();

  invokeCommand('scan_ports').then(function(result) {
    state.ports = (result && result.ports) || [];
    if (result && result.error) {
      showToast(result.error, 'error');
    } else {
      showToast('Scan complete — ' + state.ports.length + ' open port' + (state.ports.length !== 1 ? 's' : '') + ' found');
    }
    state.lastScanAt = Date.now();
    state.scanning = false;
    render();
    startAutoScan();
  }).catch(function(e) {
    showToast('Failed to scan: ' + e, 'error');
    state.scanning = false;
    render();
    startAutoScan();
  });
}

// Silent background rescan — no skeleton, no toast, preserves selections
function doSilentScan() {
  if (state.scanning || state.modal) return; // don't interrupt user actions
  invokeCommand('scan_ports').then(function(result) {
    if (!result || result.error) return;
    var newPorts = result.ports || [];
    // Detect if anything actually changed
    var oldKey = state.ports.map(function(p) { return p.pid + ':' + p.port; }).sort().join(',');
    var newKey = newPorts.map(function(p) { return p.pid + ':' + p.port; }).sort().join(',');
    state.lastScanAt = Date.now();
    if (oldKey !== newKey) {
      state.ports = newPorts;
      render();
    } else {
      updateFooterStatus();
    }
  }).catch(function() {}); // silently ignore errors on background scan
}

function startAutoScan() {
  if (autoScanInterval) clearInterval(autoScanInterval);
  autoScanInterval = setInterval(doSilentScan, AUTO_SCAN_MS);
}

function stopAutoScan() {
  if (autoScanInterval) { clearInterval(autoScanInterval); autoScanInterval = null; }
}

function doKill() {
  if (!state.modal) return;
  var pids = state.modal.targets.map(function(t) { return t.pid; });
  var force = state.modal.force;
  state.modal = null;
  render();

  invokeCommand('kill_ports', { pids: pids, force: force }).then(function(result) {
    var killedSet = {};
    for (var i = 0; i < result.killed.length; i++) killedSet[result.killed[i]] = true;
    state.ports = state.ports.filter(function(p) { return !killedSet[p.pid]; });
    var newSel = {};
    for (var k in state.selected) { if (!killedSet[k]) newSel[k] = state.selected[k]; }
    state.selected = newSel;

    if (result.failed.length > 0) {
      var reasons = result.failed.map(function(f) { return 'PID ' + f.pid + ': ' + f.reason; }).join(', ');
      showToast('Killed ' + result.killed.length + ', failed ' + result.failed.length + ' — ' + reasons, result.killed.length > 0 ? 'success' : 'error');
    } else {
      showToast('Killed ' + result.killed.length + ' process' + (result.killed.length !== 1 ? 'es' : ''));
    }
    render();
  }).catch(function(e) {
    showToast('Kill failed: ' + e, 'error');
    render();
  });
}

// ─── Render ────────────────────────────────────────────────────────────────
function render() {
  var filtered = getFiltered();
  var grouped = getGrouped(filtered);
  var catCounts = getCatCounts();
  var selPorts = getSelectedPorts();
  var catKeys = Object.keys(CATEGORIES);
  var html = '';

  // Titlebar (drag region only — no text; the H1 below is authoritative)
  html += '<div class="titlebar"></div>';

  // Header
  html += '<div class="header">';
  html += '<div class="header-left">';
  html += '<div class="app-icon"><svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">';
  html += '<defs><linearGradient id="ig" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">';
  html += '<stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>';
  html += '</linearGradient></defs>';
  html += '<rect width="36" height="36" rx="8" fill="url(#ig)"/>';
  html += '<circle cx="18" cy="18" r="7" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.9"/>';
  html += '<circle cx="18" cy="18" r="2.5" fill="#fff" opacity="0.95"/>';
  html += '<line x1="18" y1="3.5" x2="18" y2="9.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>';
  html += '<line x1="18" y1="26.5" x2="18" y2="32.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>';
  html += '<line x1="3.5" y1="18" x2="9.5" y2="18" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>';
  html += '<line x1="26.5" y1="18" x2="32.5" y2="18" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>';
  html += '<circle cx="18" cy="3.5" r="1.2" fill="#fff" opacity="0.8"/>';
  html += '<circle cx="18" cy="32.5" r="1.2" fill="#fff" opacity="0.8"/>';
  html += '<circle cx="3.5" cy="18" r="1.2" fill="#fff" opacity="0.8"/>';
  html += '<circle cx="32.5" cy="18" r="1.2" fill="#fff" opacity="0.8"/>';
  html += '</svg></div>';
  html += '<div>';
  html += '<h1>Port Manager</h1>';
  html += '<div class="subtitle">' + state.ports.length + ' open port' + (state.ports.length !== 1 ? 's' : '') + '</div>';
  html += '</div></div>';
  html += '<div class="header-actions">';
  var sortValue = state.sortKey ? (state.sortKey + ':' + state.sortDir) : '';
  html += '<select class="sort-select" title="Sort ports" onchange="setSortFromSelect(this.value)">';
  html += '<option value=""' + (sortValue === '' ? ' selected' : '') + '>Sort: Default</option>';
  var sortOpts = [
    ['port:asc', 'Port ↑'], ['port:desc', 'Port ↓'],
    ['process:asc', 'Process ↑'], ['process:desc', 'Process ↓'],
    ['pid:asc', 'PID ↑'], ['pid:desc', 'PID ↓']
  ];
  for (var so = 0; so < sortOpts.length; so++) {
    html += '<option value="' + sortOpts[so][0] + '"' + (sortValue === sortOpts[so][0] ? ' selected' : '') + '>' + sortOpts[so][1] + '</option>';
  }
  html += '</select>';
  html += '<button class="btn btn-surface" onclick="doScan()" title="Rescan ports (⌘R)"' + (state.scanning ? ' disabled' : '') + '>';
  html += '&#8635; Rescan';
  html += '</button>';
  html += '<button class="btn-icon" onclick="toggleTheme()" title="' + (currentTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode') + '">';
  if (currentTheme === 'dark') {
    // Sun icon — filled center + dashed outer ring; reads clearly as sun at 16px
    html += '<svg class="theme-icon" viewBox="0 0 24 24">';
    html += '<circle cx="12" cy="12" r="5" fill="currentColor"/>';
    html += '<circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="3 2.5" stroke-linecap="round"/>';
    html += '</svg>';
  } else {
    // Moon icon (currently light → click to go dark)
    html += '<svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">';
    html += '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    html += '</svg>';
  }
  html += '</button>';
  html += '</div></div>';

  // Search
  html += '<div class="search-bar"><div class="search-wrap">';
  html += '<span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg></span>';
  html += '<input class="search-input" type="text" placeholder="Search by process, port, or command..." ';
  html += 'value="' + esc(state.search) + '" oninput="onSearch(this.value)" />';
  if (state.search) {
    html += '<button class="search-clear" title="Clear search (Esc)" onclick="onSearch(\'\')">&#10005;</button>';
  }
  html += '</div></div>';

  // Tabs
  html += '<div class="tabs">';
  html += '<button class="tab' + (state.filterCat === 'All' ? ' active' : '') + '" onclick="onFilter(\'All\')">All <span class="tab-count">' + state.ports.length + '</span></button>';
  for (var ti = 0; ti < catKeys.length; ti++) {
    var cat = catKeys[ti];
    var info = CATEGORIES[cat];
    var count = catCounts[cat] || 0;
    if (count === 0) continue;
    var isActive = state.filterCat === cat;
    html += '<button class="tab' + (isActive ? ' active' : '') + '"';
    if (isActive) html += ' style="border-color:' + info.color + ';color:' + info.color + ';background:' + rgbaFrom(info.color, 0.1) + '"';
    html += ' onclick="onFilter(\'' + esc(cat) + '\')">';
    html += '<span style="color:' + info.color + ';display:inline-flex;align-items:center">' + categoryIconSvg(cat, 12) + '</span> ' + esc(cat);
    html += ' <span class="tab-count"';
    if (isActive) html += ' style="background:' + rgbaFrom(info.color, 0.2) + ';color:' + info.color + '"';
    html += '>' + count + '</span></button>';
  }
  html += '</div>';

  // FREE port checker
  html += '<div class="free-checker">';
  html += '<div class="free-input-wrap">';
  var freeClass = state.freeResult === 'free' ? ' is-free' : state.freeResult === 'used' ? ' is-used' : '';
  html += '<input class="free-input' + freeClass + '" type="number" min="1" max="65535" placeholder="Check port…" ';
  html += 'value="' + esc(state.freePort) + '" ';
  html += 'oninput="onFreePortInput(this.value)" ';
  html += 'onkeydown="if(event.key===\'Enter\')checkFreePort()" />';
  html += '</div>';
  html += '<button class="free-btn" onclick="checkFreePort()">Check</button>';
  if (state.freeResult === 'free') {
    html += '<span class="free-result is-free">&#10003; Free</span>';
  } else if (state.freeResult === 'used') {
    html += '<span class="free-result is-used">&#10005; In use</span>';
  } else if (state.freeResult === 'checking') {
    html += '<span class="free-result is-invalid">Checking…</span>';
  } else if (state.freeResult === 'invalid') {
    html += '<span class="free-result is-invalid">Enter 1–65535</span>';
  }
  html += '</div>';

  // Active-filter summary
  var hasFilter = state.filterCat !== 'All' || state.search || state.sortKey;
  if (hasFilter && !state.scanning) {
    html += '<div class="filter-summary">';
    html += '<span>Showing <strong>' + filtered.length + '</strong> of <strong>' + state.ports.length + '</strong></span>';
    if (state.filterCat !== 'All') {
      html += '<span class="filter-chip">' + esc(state.filterCat) + '</span>';
    }
    if (state.search) {
      html += '<span class="filter-chip">search: "' + esc(state.search) + '"</span>';
    }
    if (state.sortKey) {
      var dirArrow = state.sortDir === 'asc' ? '↑' : '↓';
      html += '<span class="filter-chip">sorted by ' + state.sortKey + ' ' + dirArrow + '</span>';
    }
    html += '<button class="clear-all" onclick="clearAllFilters()">Clear all</button>';
    html += '</div>';
  }

  // Port list
  var firstScan = state.scanning && state.ports.length === 0;
  html += '<div class="port-list' + (state.scanning && !firstScan ? ' scanning' : '') + '">';

  if (firstScan) {
    html += '<div class="group"><div class="group-table">';
    for (var si = 0; si < 6; si++) html += '<div class="skeleton-row"></div>';
    html += '</div></div>';
  } else if (Object.keys(grouped).length === 0) {
    var msg;
    if (state.search && state.filterCat !== 'All') {
      msg = 'No ' + esc(state.filterCat) + ' ports match \u201C' + esc(state.search) + '\u201D.';
    } else if (state.search) {
      msg = 'No ports match \u201C' + esc(state.search) + '\u201D.';
    } else if (state.filterCat !== 'All') {
      msg = 'No open ports in ' + esc(state.filterCat) + '.';
    } else {
      msg = 'No open ports found. Start a dev server to see it here.';
    }
    html += '<div class="empty">';
    html += '<div class="empty-icon">' + ((state.search || state.filterCat !== 'All') ? '&#128269;' : '&#127881;') + '</div>';
    html += '<p>' + msg + '</p>';
    html += '</div>';
  } else {
    var catOrder = catKeys.concat(["Other"]);
    for (var ci = 0; ci < catOrder.length; ci++) {
      var catName = catOrder[ci];
      var items = grouped[catName];
      if (!items) continue;
      var catInfo = CATEGORIES[catName] || CATEGORIES["Other"];
      var allSel = items.every(function(p) { return state.selected[p.pid]; });

      html += '<div class="group' + (state.hasRendered ? '' : ' first-paint') + '">';
      html += '<div class="group-header">';
      html += '<div class="group-header-left">';
      html += '<div class="checkbox' + (allSel ? ' checked' : '') + '" onclick="toggleGroup(\'' + esc(catName) + '\')">' + (allSel ? '&#10003;' : '') + '</div>';
      html += '<span class="group-label" style="color:' + catInfo.color + ';display:inline-flex;align-items:center;gap:6px">' + categoryIconSvg(catName, 13) + esc(catName) + '</span>';
      html += '<span class="group-count">' + items.length + '</span>';
      html += '</div>';
      html += '<button class="btn btn-sm btn-danger" onclick="openModal(\'group\', \'' + esc(catName) + '\')">Kill group</button>';
      html += '</div>';
      html += '<div class="group-table">';

      var sortedItems = sortItems(items);
      for (var pi = 0; pi < sortedItems.length; pi++) {
        var p = sortedItems[pi];
        var sel = state.selected[p.pid];
        var isSys = p.user === 'root' || (p.user && p.user.charAt(0) === '_');
        html += '<div class="port-row">';
        html += '<div class="checkbox' + (sel ? ' checked' : '') + '" title="Select row" onclick="toggleSelect(' + p.pid + ')">' + (sel ? '&#10003;' : '') + '</div>';
        html += '<button class="port-num copyable" style="color:' + catInfo.color + '" title="Copy port" onclick="copyText(\':' + p.port + '\', \'port\')">:' + p.port + '</button>';
        html += '<div style="min-width:0">';
        html += '<div class="proc-name">' + esc(p.process);
        if (p.user) {
          html += '<span class="proc-user">· ' + esc(p.user) + '</span>';
        }
        if (isSys) {
          html += '<span class="sys-shield" title="System/root process — killing this may affect your system"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 5v6c0 5 3.5 9.4 8 11 4.5-1.6 8-6 8-11V5l-8-3z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/></svg></span>';
        }
        html += '</div>';
        html += '<button class="proc-cmd copyable" title="Click to copy: ' + esc(p.command) + '" onclick="copyText(' + JSON.stringify(p.command).replace(/"/g,'&quot;') + ', \'path\')">' + esc(p.command) + '</button>';
        html += '</div>';
        html += '<span class="badge" style="background:' + rgbaFrom(catInfo.color, 0.1) + ';color:' + catInfo.color + '">' + esc(p.protocol) + '</span>';
        html += '<button class="pid-label copyable" title="Copy PID" onclick="copyText(\'' + p.pid + '\', \'PID\')">PID ' + p.pid + '</button>';
        html += '<button class="kill-single" title="Kill ' + esc(p.process) + ' (PID ' + p.pid + ')" onclick="killSingle(' + p.pid + ')">&#10005;</button>';
        html += '</div>';
      }

      html += '</div></div>';
    }
  }

  html += '</div>';

  // Footer (contents populated by updateFooterStatus)
  html += '<div class="footer"><div class="footer-hint" id="footer-status"></div></div>';

  // Sticky bulk action bar
  if (selPorts.length > 0) {
    html += '<div class="bulk-bar">';
    html += '<span class="bulk-bar-label">' + selPorts.length + ' selected</span>';
    html += '<button class="btn btn-sm btn-surface" onclick="clearSelection()">Clear</button>';
    html += '<button class="btn btn-sm btn-danger" onclick="openModal(\'selected\')">Kill ' + selPorts.length + '</button>';
    html += '</div>';
  }

  // Modal
  if (state.modal) {
    var targets = state.modal.targets;
    html += '<div class="modal-overlay" onclick="closeModal()">';
    html += '<div class="modal" onclick="event.stopPropagation()">';
    var modalTitle;
    if (state.modal.mode === 'group') {
      modalTitle = 'Kill all ' + esc(state.modal.catName) + ' processes?';
    } else {
      modalTitle = 'Kill ' + targets.length + ' port' + (targets.length > 1 ? 's' : '') + '?';
    }
    html += '<h3>' + modalTitle + '</h3>';
    html += '<p>' + (state.modal.force
      ? 'Sends <code style="background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px">SIGKILL</code> — immediate termination. The process can\u2019t clean up.'
      : 'Sends <code style="background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px">SIGTERM</code> — a polite stop request. Most processes exit cleanly.') + '</p>';
    html += '<p style="margin-top:4px">Targets:</p>';
    html += '<div class="modal-list">';
    for (var mi = 0; mi < targets.length; mi++) {
      var t = targets[mi];
      html += '<div class="modal-list-item">';
      html += '<span class="ml-name" title="' + esc(t.process) + '">' + esc(t.process) + '</span>';
      html += '<span class="ml-detail">PID ' + t.pid + ' &rarr; :' + t.port + '</span>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="force-toggle">';
    html += '<input type="checkbox" id="force-kill"' + (state.modal.force ? ' checked' : '') + ' onchange="toggleForce()" />';
    html += '<label for="force-kill">Force kill (SIGKILL)</label>';
    html += '</div>';
    html += '<div class="signal-explain">Only use force if the process ignores a normal stop signal.</div>';
    html += '<div class="modal-actions">';
    html += '<button class="btn btn-surface" onclick="closeModal()">Cancel</button>';
    html += '<button class="btn btn-danger" id="modal-kill-btn" onclick="doKill()">Kill</button>';
    html += '</div></div></div>';
  }

  // Toast
  if (state.toast) {
    var isErr = state.toast.type === 'error';
    html += '<div class="toast' + (isErr ? ' error' : '') + '">';
    html += '<span class="toast-icon">' + (isErr ? '&#10005;' : '&#10003;') + '</span>';
    html += '<span class="toast-message">' + esc(state.toast.message) + '</span>';
    if (isErr) {
      html += '<button class="toast-close" title="Dismiss" onclick="dismissToast()">&#10005;</button>';
    }
    html += '</div>';
  }

  // Commit to DOM
  var searchEl = document.querySelector('.search-input');
  var hadFocus = searchEl && document.activeElement === searchEl;
  var cursorPos = hadFocus ? searchEl.selectionStart : null;

  document.getElementById('app').innerHTML = html;

  if (hadFocus) {
    var newSearch = document.querySelector('.search-input');
    if (newSearch) {
      newSearch.focus();
      if (cursorPos !== null) newSearch.setSelectionRange(cursorPos, cursorPos);
    }
  }

  // Focus the destructive button when a modal is open so Enter confirms.
  if (state.modal) {
    var killBtn = document.getElementById('modal-kill-btn');
    if (killBtn) killBtn.focus();
  }

  state.hasRendered = true;
}

// ─── Event handlers ────────────────────────────────────────────────────────
function onSearch(val) { state.search = val; render(); }
function onFilter(cat) { state.filterCat = cat; render(); }

function onFreePortInput(val) {
  state.freePort = val;
  state.freeResult = null;
  render();
}

function checkFreePort() {
  var raw = state.freePort.trim();
  var port = parseInt(raw, 10);
  if (!raw || isNaN(port) || port < 1 || port > 65535) {
    state.freeResult = 'invalid';
    render();
    return;
  }
  state.freeResult = 'checking';
  render();
  if (IS_TAURI) {
    window.__TAURI__.tauri.invoke('check_port_free', { port: port }).then(function(free) {
      state.freeResult = free ? 'free' : 'used';
      render();
    }).catch(function() {
      state.freeResult = 'invalid';
      render();
    });
  } else {
    // Mock: a port already in the list counts as used
    setTimeout(function() {
      var inUse = state.ports.some(function(p) { return p.port === port; });
      state.freeResult = inUse ? 'used' : 'free';
      render();
    }, 300);
  }
}

function toggleSelect(pid) {
  if (state.selected[pid]) { delete state.selected[pid]; }
  else { state.selected[pid] = true; }
  render();
}

function toggleGroup(catName) {
  var items = state.ports.filter(function(p) { return p.category === catName; });
  var allSel = items.every(function(p) { return state.selected[p.pid]; });
  for (var i = 0; i < items.length; i++) {
    if (allSel) { delete state.selected[items[i].pid]; }
    else { state.selected[items[i].pid] = true; }
  }
  render();
}

function openModal(mode, catName, pid) {
  var targets;
  if (mode === 'group') {
    targets = state.ports.filter(function(p) { return p.category === catName; });
  } else {
    targets = getSelectedPorts();
  }
  if (targets.length === 0) return;
  state.modal = { targets: targets, force: false, mode: mode, catName: catName };
  render();
}

// Single-row kill: no confirmation — the red X is an intentional, per-row action
function killSingle(pid) {
  var target = state.ports.filter(function(p) { return p.pid === pid; });
  if (target.length === 0) return;
  state.modal = { targets: target, force: false, mode: 'single' };
  doKill();
}

function clearSelection() { state.selected = {}; render(); }

function clearAllFilters() {
  state.search = '';
  state.filterCat = 'All';
  state.sortKey = null;
  state.sortDir = 'asc';
  render();
}

function setSortFromSelect(value) {
  if (!value) { state.sortKey = null; state.sortDir = 'asc'; }
  else {
    var parts = value.split(':');
    state.sortKey = parts[0];
    state.sortDir = parts[1] || 'asc';
  }
  render();
}

function copyText(text, label) {
  var display = label ? 'Copied ' + label : 'Copied';
  var done = function() { showToast(display); };
  var fail = function() { showToast('Copy failed', 'error'); };
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(String(text)).then(done, fail);
      return;
    }
  } catch(e) {}
  // Fallback for older webviews
  try {
    var ta = document.createElement('textarea');
    ta.value = String(text); ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  } catch(e) { fail(); }
}

function closeModal() { state.modal = null; render(); }
function toggleForce() { if (state.modal) state.modal.force = !state.modal.force; render(); }

// ─── Footer status ticker ──────────────────────────────────────────────────
function formatAgo(ts) {
  if (!ts) return 'never';
  var s = Math.floor((Date.now() - ts) / 1000);
  if (s < 2) return 'just now';
  if (s < 60) return s + 's ago';
  var m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  var h = Math.floor(m / 60);
  return h + 'h ago';
}

// Staleness threshold: auto-scan runs every 3s, so 10s means we've missed ~3 ticks.
var STALE_SCAN_MS = 10000;

function updateFooterStatus() {
  var el = document.getElementById('footer-status');
  if (!el) return;
  var html = '';
  if (state.scanning) {
    html = '<span class="spinner-sm"></span><span>Scanning…</span>';
  } else if (!IS_TAURI) {
    html = '<span class="pulse-dot"></span><span>Browser preview — using mock data</span>';
  } else {
    var stale = state.lastScanAt && (Date.now() - state.lastScanAt) > STALE_SCAN_MS;
    html = '<span class="pulse-dot' + (stale ? ' stale' : '') + '"></span>';
    if (stale) {
      html += '<span>Last scanned: ' + formatAgo(state.lastScanAt) + ' — live updates paused</span>';
    } else {
      html += '<span>Last scanned: ' + formatAgo(state.lastScanAt) + '</span>';
    }
  }
  el.innerHTML = html;
}

setInterval(updateFooterStatus, 1000);

// ─── Keyboard shortcuts ────────────────────────────────────────────────────
// Fixed mapping — stable across scans so muscle memory works even when a
// category's count drops to zero.
var SHORTCUT_CATEGORIES = ['All', 'Dev Servers', 'Databases', 'Web / Proxy', 'Containers'];

window.addEventListener('keydown', function(e) {
  var meta = e.metaKey || e.ctrlKey;
  var tag = (e.target && e.target.tagName) || '';
  var inInput = tag === 'INPUT' || tag === 'TEXTAREA';

  if (e.key === 'Escape') {
    if (state.modal) { closeModal(); e.preventDefault(); return; }
    if (state.toast && state.toast.type === 'error') { dismissToast(); e.preventDefault(); return; }
    if (state.search) { state.search = ''; render(); e.preventDefault(); return; }
    if (inInput && e.target.blur) e.target.blur();
    return;
  }

  // Enter inside modal confirms kill — unless focus is in the force-kill checkbox
  if (state.modal && e.key === 'Enter' && !inInput) {
    if (e.target && e.target.id === 'force-kill') return;
    e.preventDefault();
    doKill();
    return;
  }

  if (!meta) return;

  if (e.key === 'r' || e.key === 'R') {
    e.preventDefault();
    if (!state.scanning) doScan();
  } else if (e.key === 'f' || e.key === 'F') {
    e.preventDefault();
    var input = document.querySelector('.search-input');
    if (input) input.focus();
  } else if (/^[1-5]$/.test(e.key)) {
    e.preventDefault();
    var idx = parseInt(e.key, 10) - 1;
    if (SHORTCUT_CATEGORIES[idx]) { state.filterCat = SHORTCUT_CATEGORIES[idx]; render(); }
  }
});

// ─── Init ──────────────────────────────────────────────────────────────────
doScan();
updateFooterStatus();
</script>
</body>
</html>
