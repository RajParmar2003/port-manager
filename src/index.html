<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      --bg: #1a1a1f;
      --surface: #242429;
      --surface-hover: #2c2c33;
      --border: #333340;
      --text: #e8e8ed;
      --text-dim: #8b8b9e;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --red: #ef4444;
      --green: #34d399;
      --orange: #f59e42;
      --mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --radius: 10px;
    }

    [data-theme="light"] {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-hover: #f0f0f2;
      --border: #d8d8de;
      --text: #1d1d1f;
      --text-dim: #6e6e80;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --red: #dc2626;
      --green: #16a34a;
      --orange: #d97706;
    }

    [data-theme="light"] ::-webkit-scrollbar-thumb { background: #c0c0c8; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }

    .titlebar {
      height: 38px; -webkit-app-region: drag;
      display: flex; align-items: center; justify-content: center;
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .titlebar span { font-size: 12px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.3px; }

    .header {
      padding: 18px 24px 0; display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .app-icon { width: 36px; height: 36px; flex-shrink: 0; }
    .app-icon svg { width: 36px; height: 36px; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
    .header .subtitle { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    button { font-family: var(--sans); cursor: pointer; border: none; outline: none; transition: all 0.15s ease; }
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
    .btn-surface { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-surface:hover { background: var(--surface-hover); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
    .btn-icon {
      width: 34px; height: 34px; border-radius: 8px; padding: 0;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { background: var(--surface-hover); color: var(--text); }

    /* Toolbar row: search + free port */
    .toolbar { padding: 14px 24px 0; display: flex; gap: 10px; }
    .search-wrap { position: relative; flex: 1; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; pointer-events: none; }
    .search-input {
      width: 100%; padding: 10px 14px 10px 36px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 13px; font-family: var(--sans); outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }

    .free-port-wrap { display: flex; gap: 0; }
    .free-port-input {
      width: 100px; padding: 10px 12px; border-radius: var(--radius) 0 0 var(--radius);
      border: 1px solid var(--border); border-right: none;
      background: var(--surface); color: var(--text);
      font-size: 13px; font-family: var(--mono); outline: none;
    }
    .free-port-input:focus { border-color: var(--accent); }
    .free-port-input::placeholder { color: var(--text-dim); }
    .free-port-btn {
      padding: 0 14px; border-radius: 0 var(--radius) var(--radius) 0;
      background: var(--red); color: #fff; font-size: 12px; font-weight: 700;
      font-family: var(--sans); border: 1px solid var(--red); white-space: nowrap;
    }
    .free-port-btn:hover { background: #dc2626; }

    /* View tabs (Ports / History) */
    .view-tabs { padding: 12px 24px 0; display: flex; gap: 6px; }
    .view-tab {
      padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
      background: var(--surface); color: var(--text-dim); border: 1px solid var(--border);
    }
    .view-tab:hover { background: var(--surface-hover); }
    .view-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(99,102,241,0.1); }

    /* Category tabs */
    .tabs { padding: 8px 24px 0; display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      padding: 6px 13px; border-radius: 8px; font-size: 12px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface); color: var(--text-dim); border: 1px solid var(--border);
    }
    .tab:hover { background: var(--surface-hover); }
    .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(99,102,241,0.1); }
    .tab-count { padding: 1px 6px; border-radius: 10px; font-size: 10.5px; background: var(--border); color: var(--text-dim); }
    .tab.active .tab-count { background: rgba(99,102,241,0.2); color: var(--accent); }

    /* Port list */
    .port-list { padding: 16px 24px 90px; }
    .group { margin-bottom: 20px; animation: fadeIn 0.3s ease both; }
    .group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 4px; }
    .group-header-left { display: flex; align-items: center; gap: 8px; }
    .group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }
    .group-count { font-size: 11px; color: var(--text-dim); }
    .group-table { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); }

    .col-header {
      display: grid;
      grid-template-columns: 30px 60px 1fr 70px 60px 72px 32px 32px 32px;
      align-items: center; gap: 8px; padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .col-header span {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-dim); font-family: var(--sans);
    }
    .col-header .col-right { text-align: right; }

    .port-row {
      display: grid;
      grid-template-columns: 30px 60px 1fr 70px 60px 72px 32px 32px 32px;
      align-items: center; gap: 8px; padding: 10px 14px;
      border-bottom: 1px solid var(--border); transition: background 0.12s; cursor: pointer;
    }
    .port-row:last-child { border-bottom: none; }
    .port-row:hover { background: var(--surface-hover); }
    .port-num { font-family: var(--mono); font-size: 13px; font-weight: 600; }
    .proc-name { font-size: 13px; font-weight: 600; }
    .proc-cmd { font-size: 11px; color: var(--text-dim); font-family: var(--mono); word-break: break-all; line-height: 1.5; margin-top: 2px; }
    .proc-meta { display: flex; gap: 4px; align-items: center; margin-top: 2px; }
    .meta-tag { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 600; cursor: default; }
    .meta-tag-clickable { cursor: pointer; }
    .meta-tag-clickable:hover { opacity: 0.8; }
    .pid-label { font-size: 11.5px; color: var(--text-dim); font-family: var(--mono); }
    .cpu-label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); text-align: right; }
    .mem-label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); text-align: right; }

    .kill-single {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(239,68,68,0.12); color: var(--red);
      font-size: 13px; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.12s;
    }
    .port-row:hover .kill-single { opacity: 1; }
    .kill-single:hover { background: var(--red); color: #fff; }

    .copy-url-btn {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(99,102,241,0.1); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: all 0.12s;
    }
    .port-row:hover .copy-url-btn { opacity: 1; }
    .copy-url-btn:hover { background: var(--accent); color: #fff; }

    .copy-path-btn {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(52,211,153,0.1); color: var(--green);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: all 0.12s;
    }
    .port-row:hover .copy-path-btn { opacity: 1; }
    .copy-path-btn:hover { background: var(--green); color: #fff; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.2px; }
    .checkbox {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.12s; flex-shrink: 0; font-size: 11px; color: transparent;
    }
    .checkbox.checked { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* History view */
    .history-list { padding: 16px 24px 90px; }
    .history-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .history-search {
      flex: 1; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 12px; font-family: var(--sans); outline: none;
    }
    .history-search:focus { border-color: var(--accent); }
    .history-search::placeholder { color: var(--text-dim); }
    .history-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .history-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); min-width: 70px; }
    .history-port { font-family: var(--mono); font-weight: 600; min-width: 55px; }
    .history-proc { color: var(--text-dim); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface); border-radius: 16px; padding: 26px 30px;
      width: 440px; max-width: 90vw; box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      border: 1px solid var(--border); animation: modalIn 0.2s ease;
    }
    .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .modal p { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 6px; }
    .modal-list {
      background: var(--bg); border-radius: var(--radius); padding: 10px 14px;
      max-height: 200px; overflow-y: auto; margin-bottom: 18px; border: 1px solid var(--border);
    }
    .modal-list-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12.5px; border-bottom: 1px solid var(--border); }
    .modal-list-item:last-child { border-bottom: none; }
    .modal-list-item .ml-name { font-weight: 600; }
    .modal-list-item .ml-detail { color: var(--text-dim); font-family: var(--mono); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal .force-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12.5px; color: var(--text-dim); }
    .modal .force-toggle input { accent-color: var(--red); }
    .modal-warning {
      padding: 8px 12px; border-radius: 8px; margin-bottom: 14px;
      background: rgba(245,158,66,0.1); border: 1px solid rgba(245,158,66,0.2);
      font-size: 12px; color: var(--orange); line-height: 1.5;
    }

    .toast {
      position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35); z-index: 1000;
      display: flex; align-items: center; gap: 8px; animation: toastIn 0.25s ease;
    }
    .toast.error { border-color: rgba(239,68,68,0.3); }
    .toast.error .toast-icon { color: var(--red); }
    .toast .toast-icon { color: var(--green); }

    .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
    .empty p { font-size: 14px; }

    .skeleton-row {
      height: 48px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 800px; animation: shimmer 1.5s infinite linear;
      border-bottom: 1px solid var(--border);
    }
    .skeleton-row:last-child { border-bottom: none; }

    .footer {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 24px;
      background: linear-gradient(transparent, var(--bg) 40%);
      display: flex; justify-content: center; pointer-events: none;
    }
    .footer-hint {
      font-size: 11.5px; color: var(--text-dim);
      background: var(--surface); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 8px; font-family: var(--mono); pointer-events: auto;
    }

    .conflict-banner {
      margin: 10px 24px 0; padding: 10px 14px; border-radius: var(--radius);
      background: rgba(245,158,66,0.1); border: 1px solid rgba(245,158,66,0.25);
      display: flex; align-items: flex-start; gap: 10px; font-size: 12.5px;
    }
    .conflict-banner .cb-icon { font-size: 16px; flex-shrink: 0; line-height: 1; }
    .conflict-banner .cb-text { color: var(--text); line-height: 1.5; }
    .conflict-banner .cb-port { font-family: var(--mono); font-weight: 700; color: var(--orange); }
    .conflict-banner .cb-action {
      margin-left: auto; flex-shrink: 0; padding: 4px 10px; border-radius: 6px;
      background: var(--orange); color: #fff; font-size: 11px; font-weight: 700;
      font-family: var(--sans);
    }
    .conflict-banner .cb-action:hover { opacity: 0.85; }

    .error-box {
      margin: 20px; padding: 20px; border-radius: 10px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: var(--red); font-family: var(--mono); font-size: 13px;
      white-space: pre-wrap; word-break: break-all;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('app');
  if (el) el.innerHTML = '<div class="error-box">Error: ' + msg + '\nLine ' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '</div>';
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('app');
  if (el) el.innerHTML = '<div class="error-box">Unhandled Promise: ' + (e.reason || e) + '</div>';
});

// ─── Tauri IPC ─────────────────────────────────────────────────────────────
var tauriInvoke = null;
try {
  if (window.__TAURI__ && window.__TAURI__.tauri && typeof window.__TAURI__.tauri.invoke === 'function') {
    tauriInvoke = window.__TAURI__.tauri.invoke;
  }
} catch(e) {}
var IS_TAURI = !!tauriInvoke;

// Theme
var currentTheme = 'dark';
try { currentTheme = localStorage.getItem('pm-theme') || 'dark'; } catch(e) {}
document.documentElement.setAttribute('data-theme', currentTheme);
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  try { localStorage.setItem('pm-theme', currentTheme); } catch(e) {}
  render();
}

// Clipboard
function copyToClipboard(text) {
  try {
    if (window.__TAURI__ && window.__TAURI__.clipboard) {
      window.__TAURI__.clipboard.writeText(text);
    } else {
      navigator.clipboard.writeText(text);
    }
    showToast('Copied ' + text);
  } catch(e) {
    showToast('Copy failed', 'error');
  }
}

function invokeCommand(cmd, args) {
  if (!args) args = {};
  if (IS_TAURI) { return tauriInvoke(cmd, args); }
  // Mock fallback for browser preview
  if (cmd === 'scan_ports') {
    return new Promise(function(resolve) {
      setTimeout(function() {
        resolve({ ports: [
          { pid: 1201, process: "node", port: 3000, protocol: "TCP", state: "LISTEN", user: "you", command: "node next dev", category: "Dev Servers", cpu: 2.3, memory_mb: 145.2, is_orphan: false, docker_container: null, launch_agent: null },
          { pid: 1202, process: "node", port: 3001, protocol: "TCP", state: "LISTEN", user: "you", command: "node next dev", category: "Dev Servers", cpu: 0.1, memory_mb: 98.0, is_orphan: true, docker_container: null, launch_agent: null },
          { pid: 502, process: "postgres", port: 5432, protocol: "TCP", state: "LISTEN", user: "_postgres", command: "/usr/local/opt/postgresql/bin/postgres", category: "Databases", cpu: 0.0, memory_mb: 22.4, is_orphan: false, docker_container: null, launch_agent: "homebrew.mxcl.postgresql@14" },
          { pid: 503, process: "redis-server", port: 6379, protocol: "TCP", state: "LISTEN", user: "you", command: "redis-server *:6379", category: "Databases", cpu: 0.1, memory_mb: 3.2, is_orphan: false, docker_container: "my-redis (redis:7) — Up 2 hours", launch_agent: null },
          { pid: 700, process: "nginx", port: 80, protocol: "TCP", state: "LISTEN", user: "root", command: "nginx: master", category: "Web / Proxy", cpu: 0.0, memory_mb: 5.1, is_orphan: false, docker_container: null, launch_agent: null },
          { pid: 1500, process: "sshd", port: 22, protocol: "TCP", state: "LISTEN", user: "root", command: "sshd", category: "System", cpu: 0.0, memory_mb: 1.8, is_orphan: false, docker_container: null, launch_agent: null }
        ], error: null });
      }, 500);
    });
  }
  if (cmd === 'kill_ports') {
    return new Promise(function(resolve) { setTimeout(function() { resolve({ success: true, killed: args.pids || [], failed: [] }); }, 300); });
  }
  if (cmd === 'free_port') {
    return new Promise(function(resolve) { setTimeout(function() { resolve({ success: true, port: args.port, killed_pid: 1201, killed_process: "node", error: null }); }, 300); });
  }
  if (cmd === 'get_conflicts') {
    return new Promise(function(resolve) {
      resolve([{ intended_port: 3000, actual_port: 3001, process: "node", pid: 1202, blocker_process: "node", blocker_pid: 1201 }]);
    });
  }
  if (cmd === 'get_history') {
    return new Promise(function(resolve) {
      var ts = Math.floor(Date.now() / 1000);
      resolve([
        { timestamp: ts - 7200, event_type: "opened", port: 5432, pid: 502, process: "postgres" },
        { timestamp: ts - 300, event_type: "opened", port: 3000, pid: 1201, process: "node" },
        { timestamp: ts - 120, event_type: "opened", port: 6379, pid: 503, process: "redis-server" },
        { timestamp: ts - 60, event_type: "closed", port: 8080, pid: 999, process: "python3" },
        { timestamp: ts - 10, event_type: "opened", port: 3001, pid: 1202, process: "node" }
      ]);
    });
  }
  if (cmd === 'clear_history') {
    return new Promise(function(resolve) { resolve(null); });
  }
  if (cmd === 'stop_launch_agent') {
    return new Promise(function(resolve) { setTimeout(function() { resolve("Stopped " + args.label); }, 300); });
  }
  return Promise.resolve(null);
}

// ─── Category config ───────────────────────────────────────────────────────
var CATEGORIES = {
  "Dev Servers": { color: "#34d399", icon: "D" },
  "Databases":   { color: "#f59e42", icon: "B" },
  "Web / Proxy": { color: "#60a5fa", icon: "W" },
  "Containers":  { color: "#a78bfa", icon: "C" },
  "Apps":        { color: "#f472b6", icon: "A" },
  "System":      { color: "#94a3b8", icon: "S" },
  "Other":       { color: "#64748b", icon: "?" }
};

// ─── State ─────────────────────────────────────────────────────────────────
var state = {
  ports: [], selected: {}, search: '', filterCat: 'All',
  scanning: false, modal: null, toast: null, toastTimer: null,
  freePortValue: '', view: 'ports', history: [], conflicts: [],
  historySearch: ''
};

// ─── Helpers ───────────────────────────────────────────────────────────────
function esc(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function rgbaFrom(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}
function showToast(message, type) {
  if (!type) type = 'success';
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toast = { message: message, type: type };
  render();
  state.toastTimer = setTimeout(function() { state.toast = null; render(); }, 2800);
}
function relativeTime(ts) {
  var now = Math.floor(Date.now() / 1000);
  var diff = now - ts;
  if (diff < 0) return 'just now';
  if (diff < 10) return 'just now';
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}
function formatTime(ts) {
  var d = new Date(ts * 1000);
  var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
  return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}
function extractContainerName(dockerStr) {
  // docker_container format: "container_name (image) — status"
  if (!dockerStr) return '';
  var paren = dockerStr.indexOf('(');
  if (paren > 0) return dockerStr.substring(0, paren).trim();
  return dockerStr;
}
function getFiltered() {
  return state.ports.filter(function(p) {
    if (state.filterCat !== 'All' && p.category !== state.filterCat) return false;
    if (state.search) {
      var s = state.search.toLowerCase();
      return p.process.toLowerCase().indexOf(s) !== -1 || String(p.port).indexOf(s) !== -1 || p.command.toLowerCase().indexOf(s) !== -1;
    }
    return true;
  });
}
function getGrouped(filtered) { var g = {}; for (var i = 0; i < filtered.length; i++) { var p = filtered[i]; if (!g[p.category]) g[p.category] = []; g[p.category].push(p); } return g; }
function getCatCounts() { var c = {}; for (var i = 0; i < state.ports.length; i++) { c[state.ports[i].category] = (c[state.ports[i].category] || 0) + 1; } return c; }
function getSelectedPorts() { return state.ports.filter(function(p) { return state.selected[p.pid]; }); }
function getFilteredHistory() {
  if (!state.historySearch) return state.history;
  var s = state.historySearch.toLowerCase();
  return state.history.filter(function(ev) {
    return String(ev.port).indexOf(s) !== -1 || ev.process.toLowerCase().indexOf(s) !== -1;
  });
}

// ─── Actions ───────────────────────────────────────────────────────────────
var autoScanInterval = null;
var AUTO_SCAN_MS = 3000;

function doScan() {
  state.scanning = true; state.selected = {}; render();
  invokeCommand('scan_ports').then(function(result) {
    state.ports = (result && result.ports) || [];
    if (result && result.error) { showToast(result.error, 'error'); }
    else { showToast('Scan complete — ' + state.ports.length + ' port' + (state.ports.length !== 1 ? 's' : '')); }
    state.scanning = false;
    invokeCommand('get_conflicts').then(function(c) { state.conflicts = c || []; render(); }).catch(function() { render(); });
    startAutoScan();
  }).catch(function(e) { showToast('Scan failed: ' + e, 'error'); state.scanning = false; render(); startAutoScan(); });
}

function doSilentScan() {
  if (state.scanning || state.modal) return;
  invokeCommand('scan_ports').then(function(result) {
    if (!result || result.error) return;
    var newPorts = result.ports || [];
    var oldKey = state.ports.map(function(p) { return p.pid + ':' + p.port; }).sort().join(',');
    var newKey = newPorts.map(function(p) { return p.pid + ':' + p.port; }).sort().join(',');
    if (oldKey !== newKey) {
      state.ports = newPorts;
      invokeCommand('get_conflicts').then(function(c) { state.conflicts = c || []; render(); }).catch(function() { render(); });
    }
  }).catch(function() {});
}

function startAutoScan() { if (autoScanInterval) clearInterval(autoScanInterval); autoScanInterval = setInterval(doSilentScan, AUTO_SCAN_MS); }

function doKill() {
  if (!state.modal) return;
  var pids = state.modal.targets.map(function(t) { return t.pid; });
  var force = state.modal.force;
  state.modal = null; render();
  invokeCommand('kill_ports', { pids: pids, force: force }).then(function(result) {
    var ks = {}; for (var i = 0; i < result.killed.length; i++) ks[result.killed[i]] = true;
    state.ports = state.ports.filter(function(p) { return !ks[p.pid]; });
    var ns = {}; for (var k in state.selected) { if (!ks[k]) ns[k] = state.selected[k]; } state.selected = ns;
    if (result.failed.length > 0) {
      showToast('Killed ' + result.killed.length + ', failed ' + result.failed.length, result.killed.length > 0 ? 'success' : 'error');
    } else { showToast('Killed ' + result.killed.length + ' process' + (result.killed.length !== 1 ? 'es' : '')); }
    render();
  }).catch(function(e) { showToast('Kill failed: ' + e, 'error'); render(); });
}

function doFreePort() {
  var port = parseInt(state.freePortValue);
  if (!port || port < 1 || port > 65535) { showToast('Enter a valid port (1-65535)', 'error'); return; }
  invokeCommand('free_port', { port: port, force: false }).then(function(r) {
    if (r.success && r.killed_pid) {
      showToast('Freed :' + r.port + ' (killed ' + r.killed_process + ' PID ' + r.killed_pid + ')');
      state.freePortValue = '';
      doSilentScan();
    } else if (r.success) {
      showToast('Port ' + r.port + ' is already free');
      state.freePortValue = '';
    } else {
      showToast('Failed: ' + (r.error || 'unknown'), 'error');
    }
    render();
  }).catch(function(e) { showToast('Free port failed: ' + e, 'error'); });
}

function loadHistory() {
  invokeCommand('get_history').then(function(h) {
    state.history = h || [];
    render();
  });
}

function doClearHistory() {
  invokeCommand('clear_history').then(function() {
    state.history = [];
    showToast('History cleared');
    render();
  }).catch(function(e) { showToast('Clear failed: ' + e, 'error'); });
}

function stopAgent(label) {
  invokeCommand('stop_launch_agent', { label: label }).then(function(msg) {
    showToast(msg || 'Stop signal sent');
    setTimeout(doSilentScan, 1000); // rescan after a beat to see if it stopped
  }).catch(function(e) { showToast('Stop failed: ' + e, 'error'); });
}

  html += '<line x1="3.5" y1="18" x2="9.5" y2="18" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>';
  html += '<line x1="26.5" y1="18" x2="32.5" y2="18" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>';

    } else {

        html += '<span class="group-label" style="color:' + catInfo.color + '">' + catInfo.icon + ' ' + esc(catName) + '</span>';

        html += '<div class="group-table">';
        html += '<div class="col-header"><span></span><span>Port</span><span>Process</span><span class="col-right">CPU</span><span class="col-right">Mem</span><span>PID</span><span></span><span></span><span></span></div>';

          html += '<div style="min-width:0"><div class="proc-name">' + esc(p.process);

          }

            html += ' <span class="meta-tag" style="background:' + rgbaFrom('#a78bfa', 0.15) + ';color:#a78bfa" title="' + esc(p.docker_container) + '">' + esc(cname) + '</span>';

          html += '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M3.5 10.5V3.5a1.5 1.5 0 011.5-1.5h7"/></svg>';
          html += '</button>';
          html += '<button class="copy-path-btn" onclick="event.stopPropagation();copyToClipboard(\'' + esc(p.command.split(' ')[0]) + '\')" title="Copy path (' + esc(p.command.split(' ')[0]) + ')">';
          html += '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M3.5 10.5V3.5a1.5 1.5 0 011.5-1.5h7"/><path d="M8 9.5l1.5 1.5L8 12.5" stroke-width="1.2"/></svg>';
          html += '</button>';
          html += '<button class="kill-single" onclick="event.stopPropagation();openModal(\'single\',null,' + p.pid + ')">&#10005;</button>';
          html += '</div>';
        }
        html += '</div></div>';
      }
    }
    html += '</div>';

  } else {
    // History view
    html += '<div class="history-list">';
    html += '<div class="history-toolbar">';
    html += '<input class="history-search" type="text" placeholder="Filter by port or process..." value="' + esc(state.historySearch) + '" oninput="onHistorySearch(this.value)" />';
    if (state.history.length > 0) {
      html += '<button class="btn btn-sm btn-surface" onclick="doClearHistory()">Clear</button>';
    }
    html += '</div>';

    var filteredHistory = getFilteredHistory();
    if (filteredHistory.length === 0) {

    } else {

    html += '<div class="modal-actions"><button class="btn btn-surface" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doKill()">Kill</button></div>';
    html += '</div></div>';
  }

  // Toast
  if (state.toast) {
    html += '<div class="toast' + (state.toast.type === 'error' ? ' error' : '') + '"><span class="toast-icon">' + (state.toast.type === 'error' ? '&#10005;' : '&#10003;') + '</span>' + esc(state.toast.message) + '</div>';
  }

  // Commit to DOM — preserve focus and cursor position
  var searchEl = document.querySelector('.search-input');
  var freeEl = document.querySelector('.free-port-input');
  var histEl = document.querySelector('.history-search');
  var hadSearchFocus = searchEl && document.activeElement === searchEl;
  var hadFreeFocus = freeEl && document.activeElement === freeEl;
  var hadHistFocus = histEl && document.activeElement === histEl;
  var searchCursor = hadSearchFocus ? searchEl.selectionStart : null;
  var freeCursor = hadFreeFocus ? freeEl.selectionStart : null;
  var histCursor = hadHistFocus ? histEl.selectionStart : null;

  document.getElementById('app').innerHTML = html;

  if (hadSearchFocus) { var ns = document.querySelector('.search-input'); if (ns) { ns.focus(); if (searchCursor !== null) ns.setSelectionRange(searchCursor, searchCursor); } }
  if (hadFreeFocus) { var nf = document.querySelector('.free-port-input'); if (nf) { nf.focus(); if (freeCursor !== null) nf.setSelectionRange(freeCursor, freeCursor); } }
  if (hadHistFocus) { var nh = document.querySelector('.history-search'); if (nh) { nh.focus(); if (histCursor !== null) nh.setSelectionRange(histCursor, histCursor); } }
}

// ─── Event handlers ────────────────────────────────────────────────────────
function onSearch(val) { state.search = val; render(); }
function onFilter(cat) { state.filterCat = cat; render(); }
function onHistorySearch(val) { state.historySearch = val; render(); }
function toggleSelect(pid) { if (state.selected[pid]) delete state.selected[pid]; else state.selected[pid] = true; render(); }
function toggleGroup(catName) {
  var items = state.ports.filter(function(p) { return p.category === catName; });
  var allSel = items.every(function(p) { return state.selected[p.pid]; });
  for (var i = 0; i < items.length; i++) { if (allSel) delete state.selected[items[i].pid]; else state.selected[items[i].pid] = true; }
  render();
}
function openModal(mode, catName, pid) {
  var targets;
  if (mode === 'single') targets = state.ports.filter(function(p) { return p.pid === pid; });
  else if (mode === 'group') targets = state.ports.filter(function(p) { return p.category === catName; });
  else targets = getSelectedPorts();
  if (targets.length === 0) return;
  state.modal = { targets: targets, force: false }; render();
}
function closeModal() { state.modal = null; render(); }
function toggleForce() { if (state.modal) state.modal.force = !state.modal.force; render(); }
function switchView(v) { state.view = v; if (v === 'history') loadHistory(); render(); }
function freeConflict(port) {
  invokeCommand('free_port', { port: port, force: false }).then(function(r) {
    if (r.success && r.killed_pid) {
      showToast('Freed :' + port + ' (killed ' + r.killed_process + ')');
      doSilentScan();
    } else if (r.success) {
      showToast('Port ' + port + ' is already free');
    } else {
      showToast('Failed: ' + (r.error || 'unknown'), 'error');
    }
  }).catch(function(e) { showToast('Free failed: ' + e, 'error'); });
}

// ─── Tray events ────────────────────────────────────────────────────────────
try {
  if (window.__TAURI__ && window.__TAURI__.event && window.__TAURI__.event.listen) {
    window.__TAURI__.event.listen('tray-rescan', function() { doSilentScan(); });
  }
} catch(e) {}

// ─── Init ──────────────────────────────────────────────────────────────────
doScan();
</script>
